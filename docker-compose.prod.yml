# Uso: docker-compose -f docker-compose.prod.yml up -d
# Requer arquivo .env.prod na mesma pasta
services:
  db:
    image: postgres:16-alpine
    container_name: uniform-db
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: uniform_manager
    # Porta nao exposta para o host em producao (acesso somente interno)
    command: postgres -c shared_buffers=64MB -c work_mem=4MB -c max_connections=20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniform-manager
    ports:
      - "3001:3000"
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
